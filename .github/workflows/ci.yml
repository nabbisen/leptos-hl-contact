name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust 1.91
        run: |
          sudo apt-get update
          sudo apt-get install -y rustc-1.91 cargo-1.91
          echo "/usr/bin" >> $GITHUB_PATH

      - name: fmt
        run: cargo-1.91 fmt --all --check

      - name: clippy
        run: cargo-1.91 clippy --all-targets --all-features -- -D warnings

      - name: test
        run: cargo-1.91 test --all-features

      - name: doc
        run: cargo-1.91 doc --all-features --no-deps
